<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CSV Cleaner</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; }
    label { display:inline-block; margin-right: 10px; }
    select { padding: 4px; }
  </style>
</head>
<body>

<h1>CSV Cleaner (sin BOM, sin comillas, sin espacios)</h1>

<input type="file" id="csvInput" accept=".csv,.CSV">
<br><br>

<label for="encodingSelect">Codificación de entrada:</label>
<select id="encodingSelect">
  <option value="auto" selected>Auto (recomendado)</option>
  <option value="utf-8">UTF-8</option>
  <option value="windows-1252">Windows-1252 (Excel/Windows)</option>
  <option value="iso-8859-1">ISO-8859-1</option>
</select>

<label style="margin-left:14px;">
  <input type="checkbox" id="addBOM">
  Añadir BOM (mejor para Excel)
</label>

<br><br>
<button onclick="cleanCSV()">Convertir y descargar</button>

<script>
async function readFileAsTextWithEncoding(file, encoding) {
  // Leemos como ArrayBuffer y decodificamos nosotros para controlar la codificación
  const buf = await file.arrayBuffer();
  const decoder = new TextDecoder(encoding, { fatal: false });
  return decoder.decode(buf);
}

function looksMisdecoded(text) {
  // Si hay muchos caracteres de reemplazo, casi seguro que la codificación es incorrecta
  const repl = (text.match(/\uFFFD/g) || []).length;
  return repl > 0; // puedes endurecerlo si quieres: repl > 2, etc.
}


function pad2(n) {
  return String(n).padStart(2, "0");
}

function normalizeSpanishDate(value) {
  // Normaliza fechas tipo:
  // 15-DEC-2025 07:36:06 -> 15/12/2025 07:36:06
  // 15-12-2025 07:36:06  -> 15/12/2025 07:36:06
  // 15-ENE-2025, 15-FEB-2025, etc.
  const raw = String(value || "").trim();
  if (!raw) return raw;

  const months = {
    "1": 1, "01": 1, "JAN": 1, "ENE": 1, "ENERO": 1,
    "2": 2, "02": 2, "FEB": 2, "FEBRERO": 2,
    "3": 3, "03": 3, "MAR": 3, "MARZO": 3,
    "4": 4, "04": 4, "APR": 4, "ABR": 4, "ABRIL": 4,
    "5": 5, "05": 5, "MAY": 5, "MAYO": 5,
    "6": 6, "06": 6, "JUN": 6, "JUNIO": 6,
    "7": 7, "07": 7, "JUL": 7, "JULIO": 7,
    "8": 8, "08": 8, "AUG": 8, "AGO": 8, "AGOSTO": 8,
    "9": 9, "09": 9, "SEP": 9, "SEPT": 9, "SEPTIEMBRE": 9,
    "10": 10, "OCT": 10, "OCTUBRE": 10,
    "11": 11, "NOV": 11, "NOVIEMBRE": 11,
    "12": 12, "DEC": 12, "DIC": 12, "DICIEMBRE": 12
  };

  const normalized = raw
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase();

  const m = normalized.match(/^(\d{1,2})[\/-](\d{1,2}|[A-Z]+)[\/-](\d{2,4})(?:[ T]+(\d{1,2}:\d{2}(?::\d{2})?))?$/);
  if (!m) return raw;

  let [, d, mon, y, time] = m;
  const monthNum = months[mon];
  if (!monthNum) return raw;

  if (y.length === 2) y = Number(y) >= 70 ? "19" + y : "20" + y;

  // Validación simple para evitar convertir textos que no son fechas reales.
  const dayNum = Number(d);
  const yearNum = Number(y);
  const dt = new Date(yearNum, monthNum - 1, dayNum);
  if (dt.getFullYear() !== yearNum || dt.getMonth() !== monthNum - 1 || dt.getDate() !== dayNum) return raw;

  return `${pad2(dayNum)}/${pad2(monthNum)}/${y}${time ? " " + time : ""}`;
}

function shouldNormalizeDateField(fieldName, value) {
  // Aplica siempre a columnas con "date"/"fecha" y también a cualquier valor
  // que claramente parezca fecha, por si el CSV trae nombres de columna distintos.
  const f = String(fieldName || "").toLowerCase();
  const looksLikeDateColumn = f.includes("date") || f.includes("fecha");
  const looksLikeDateValue = /^\s*\d{1,2}[\/-](\d{1,2}|[A-Za-zÁÉÍÓÚÜÑáéíóúüñ]+)[\/-]\d{2,4}/.test(String(value || ""));
  return looksLikeDateColumn || looksLikeDateValue;
}

async function cleanCSV(){
  const file = document.getElementById("csvInput").files[0];
  if (!file) return alert("Selecciona un CSV");

  const encSel = document.getElementById("encodingSelect").value;
  const addBOM = document.getElementById("addBOM").checked;

  let text;

  if (encSel === "auto") {
    // 1) Intento UTF-8
    const tUtf8 = await readFileAsTextWithEncoding(file, "utf-8");
    // 2) Si hay �, probablemente venía en Windows-1252
    if (looksMisdecoded(tUtf8)) {
      text = await readFileAsTextWithEncoding(file, "windows-1252");
    } else {
      text = tUtf8;
    }
  } else {
    text = await readFileAsTextWithEncoding(file, encSel);
  }

  // Parseamos desde texto (no desde File) para mantener nuestra decodificación
  const res = Papa.parse(text, {
    header: true,
    skipEmptyLines: true
  });

  if (res.errors && res.errors.length) {
    console.warn("Errores de parseo:", res.errors);
    // No abortamos necesariamente; depende del CSV
  }

  const fields = res.meta.fields || [];
  const rows = res.data || [];

  const cleanRows = rows.map(row => {
    const out = {};
    fields.forEach(f => {
      let v = row[f];
      if (v == null) v = "";
      v = String(v).trim();
      if (shouldNormalizeDateField(f, v)) {
        v = normalizeSpanishDate(v);
      }
      out[f] = v;
    });
    return out;
  });

  const csv = Papa.unparse(cleanRows, {
    quotes: false,
    delimiter: ",",
    newline: "\n"
  });

  // Salida UTF-8 (opcionalmente con BOM)
  const bom = addBOM ? "\uFEFF" : "";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  const baseName = file.name.replace(/\.csv$/i, "");
  a.download = baseName + "_CLEAN.CSV";
  a.click();
}
</script>

</body>
</html>
